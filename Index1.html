<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#020817" />
  <title>Allowance Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Sora:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #020817;
      --surface:   #0F172A;
      --card:      #1E293B;
      --border:    #1E293B;
      --border2:   #334155;
      --text:      #F1F5F9;
      --muted:     #94A3B8;
      --dim:       #64748B;
      --purple:    #7C3AED;
      --purple-lt: #C084FC;
      --red:       #F87171;
      --yellow:    #FACC15;
      --green:     #4ADE80;
      --orange:    #FB923C;
      --font-disp: 'Playfair Display', Georgia, serif;
      --font-ui:   'Sora', sans-serif;
      --font-mono: 'Space Grotesk', monospace;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      min-height: 100%;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ─────────────────────────────────────── */
    #app-header {
      position: sticky;
      top: 0;
      z-index: 200;
      background: linear-gradient(180deg, #0A0F1E 0%, #020817 100%);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px 0;
    }

    .app-title-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .app-title {
      font-family: var(--font-disp);
      font-size: 22px;
      font-weight: 900;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .app-badge {
      font-size: 11px;
      color: var(--purple-lt);
      font-weight: 600;
      background: rgba(124,58,237,0.15);
      border: 1px solid rgba(124,58,237,0.3);
      border-radius: 20px;
      padding: 3px 10px;
      white-space: nowrap;
    }

    /* ── EXPORT / IMPORT BUTTONS ────────────────────── */
    .io-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 13px;
      border-radius: 9px;
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      min-height: 36px;
    }
    .io-btn:active { opacity: 0.75; transform: scale(0.96); }
    .io-btn.export-btn {
      background: rgba(124,58,237,0.15);
      border-color: rgba(124,58,237,0.4);
      color: var(--purple-lt);
    }
    .io-btn.import-btn {
      background: rgba(15,23,42,0.8);
      border-color: var(--border2);
      color: var(--muted);
    }
    .io-btn svg { flex-shrink: 0; }

    /* ── TOAST ───────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1E293B;
      border: 1px solid var(--border2);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 14px;
      font-weight: 500;
      padding: 12px 22px;
      border-radius: 50px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.success { border-color: rgba(74,222,128,0.5); color: var(--green); }
    #toast.error   { border-color: rgba(251,146,60,0.5);  color: var(--orange); }

    /* ── CONFIRM MODAL ───────────────────────────────── */
    #modal-overlay {
      position: fixed; inset: 0;
      background: rgba(2,8,23,0.85);
      z-index: 8000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    #modal-overlay.show { opacity: 1; pointer-events: all; }
    .modal-box {
      background: #0F172A;
      border: 1px solid var(--border2);
      border-radius: 18px;
      padding: 28px 24px 22px;
      max-width: 320px;
      width: 100%;
      box-shadow: 0 24px 64px rgba(0,0,0,0.7);
      transform: scale(0.95);
      transition: transform 0.2s;
    }
    #modal-overlay.show .modal-box { transform: scale(1); }
    .modal-icon { font-size: 32px; margin-bottom: 12px; }
    .modal-title { font-family: var(--font-disp); font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .modal-body  { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 22px; }
    .modal-body strong { color: var(--orange); }
    .modal-actions { display: flex; gap: 10px; }
    .modal-cancel {
      flex: 1; padding: 12px; border-radius: 10px;
      background: var(--card); border: 1px solid var(--border2);
      color: var(--muted); font-family: var(--font-ui); font-size: 14px; font-weight: 600;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .modal-confirm {
      flex: 1; padding: 12px; border-radius: 10px;
      background: rgba(251,146,60,0.15); border: 1.5px solid rgba(251,146,60,0.5);
      color: var(--orange); font-family: var(--font-ui); font-size: 14px; font-weight: 700;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .modal-confirm:active, .modal-cancel:active { opacity: 0.7; }

    /* ── TAB STRIP ─────────────────────────────────── */
    #tab-strip {
      display: flex;
      gap: 2px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: 0;
    }
    #tab-strip::-webkit-scrollbar { display: none; }

    .tab-btn {
      flex-shrink: 0;
      min-width: 44px;
      min-height: 44px;
      padding: 8px 12px;
      background: transparent;
      border: none;
      border-bottom: 2.5px solid transparent;
      color: var(--dim);
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 8px 8px 0 0;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      position: relative;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-btn.active {
      color: var(--purple-lt);
      border-bottom-color: var(--purple);
      background: rgba(124,58,237,0.18);
      font-weight: 700;
    }
    .tab-btn.summary-tab {
      font-size: 13px;
      padding: 8px 16px;
    }

    .tab-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── CONTENT ────────────────────────────────────── */
    #content {
      max-width: 700px;
      margin: 0 auto;
      padding: 24px 16px 60px;
    }

    /* ── DAY HEADER ─────────────────────────────────── */
    .day-heading {
      font-family: var(--font-disp);
      font-size: clamp(38px, 10vw, 52px);
      font-weight: 900;
      color: var(--text);
      line-height: 1;
      letter-spacing: -0.03em;
    }
    .day-of-total {
      color: var(--purple-lt);
      font-family: var(--font-ui);
      font-size: 17px;
      font-weight: 500;
      margin-left: 10px;
    }
    .day-subhead {
      font-family: var(--font-ui);
      font-size: 14px;
      color: var(--muted);
      margin-top: 7px;
    }
    .day-allowance-amt {
      color: var(--purple-lt);
      font-weight: 700;
      font-size: 16px;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, rgba(124,58,237,0.35), transparent);
      margin: 18px 0;
    }

    /* ── INPUT ROW ───────────────────────────────────── */
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .input-row input {
      background: var(--surface);
      border: 1.5px solid var(--card);
      border-radius: 10px;
      padding: 13px 14px;
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 15px;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
      transition: border-color 0.2s;
    }
    .input-row input:focus { border-color: var(--purple); }
    .input-row input::placeholder { color: var(--dim); }
    .input-desc { flex: 2 1 160px; }
    .input-amt  { flex: 1 1 110px; font-family: var(--font-mono) !important; }

    .add-btn {
      flex-shrink: 0;
      background: linear-gradient(135deg, #7C3AED, #9D4EDD);
      border: none;
      border-radius: 10px;
      padding: 13px 20px;
      color: #fff;
      font-family: var(--font-ui);
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(124,58,237,0.4);
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s, transform 0.1s;
    }
    .add-btn:active { opacity: 0.85; transform: scale(0.97); }

    /* ── TABLE ───────────────────────────────────────── */
    .table-wrap {
      background: var(--surface);
      border-radius: 14px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      padding: 12px 16px;
      text-align: left;
      font-family: var(--font-ui);
      font-size: 10px;
      color: var(--dim);
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }
    thead th.right { text-align: right; }

    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:nth-child(even) { background: rgba(255,255,255,0.018); }

    tbody td {
      padding: 13px 16px;
      font-family: var(--font-ui);
      font-size: 14px;
      color: #CBD5E1;
    }
    tbody td.amt-cell {
      text-align: right;
      font-family: var(--font-mono);
      color: var(--red);
      font-weight: 600;
    }
    tbody td.del-cell {
      width: 44px;
      text-align: center;
      padding: 0;
    }

    .del-btn {
      background: none;
      border: none;
      color: var(--border2);
      font-size: 20px;
      cursor: pointer;
      padding: 13px 14px;
      line-height: 1;
      display: block;
      width: 44px;
      text-align: center;
      transition: color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .del-btn:active { color: var(--red); }

    .empty-row td {
      padding: 32px 16px;
      text-align: center;
      font-size: 13px;
      color: var(--border2);
      font-style: italic;
    }

    tfoot tr { border-top: 1.5px solid var(--border2); }
    tfoot td {
      padding: 12px 16px;
      font-family: var(--font-ui);
      font-size: 12px;
      color: var(--dim);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    tfoot td.total-amt {
      text-align: right;
      font-family: var(--font-mono);
      font-size: 16px;
      color: var(--red);
      font-weight: 700;
    }

    /* ── BALANCE BADGE ───────────────────────────────── */
    .balance-badge {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-radius: 14px;
      padding: 18px 20px;
      margin-top: 18px;
      border: 1.5px solid transparent;
      transition: all 0.35s ease;
    }
    .balance-label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .balance-amount {
      font-family: var(--font-mono);
      font-size: clamp(20px, 6vw, 28px);
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .balance-badge.positive {
      background: rgba(234,179,8,0.1);
      border-color: rgba(250,204,21,0.5);
      box-shadow: 0 0 24px rgba(250,204,21,0.18);
    }
    .balance-badge.positive .balance-amount { color: var(--yellow); }
    .balance-badge.zero {
      background: rgba(34,197,94,0.1);
      border-color: rgba(74,222,128,0.5);
      box-shadow: 0 0 24px rgba(74,222,128,0.18);
    }
    .balance-badge.zero .balance-amount { color: var(--green); }
    .balance-badge.negative {
      background: rgba(249,115,22,0.1);
      border-color: rgba(251,146,60,0.5);
      box-shadow: 0 0 24px rgba(251,146,60,0.2);
    }
    .balance-badge.negative .balance-amount { color: var(--orange); }

    /* ── SUMMARY ─────────────────────────────────────── */
    .summary-heading {
      font-family: var(--font-disp);
      font-size: clamp(34px, 9vw, 44px);
      font-weight: 900;
      color: var(--text);
      letter-spacing: -0.03em;
    }
    .summary-sub {
      color: var(--dim);
      font-size: 14px;
      margin-top: 5px;
      margin-bottom: 22px;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 24px;
    }
    @media (max-width: 400px) {
      .stat-grid { grid-template-columns: 1fr; }
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 14px;
      text-align: center;
    }
    .stat-card-label {
      font-size: 10px;
      color: var(--dim);
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .stat-card-value {
      font-family: var(--font-mono);
      font-size: clamp(14px, 3.5vw, 18px);
      font-weight: 700;
    }

    .summary-table-wrap {
      background: var(--surface);
      border-radius: 14px;
      border: 1px solid var(--border);
      overflow: hidden;
      overflow-x: auto;
    }
    .summary-table th {
      padding: 11px 14px;
      font-size: 10px;
      color: var(--dim);
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      text-align: right;
      white-space: nowrap;
    }
    .summary-table th:first-child { text-align: left; }
    .summary-table tbody td {
      padding: 10px 14px;
      font-size: 13px;
      text-align: right;
      white-space: nowrap;
    }
    .summary-table tbody td:first-child {
      font-family: var(--font-disp);
      font-size: 14px;
      font-weight: 700;
      color: #CBD5E1;
      text-align: left;
    }
    .summary-table tbody td.s-allowance { font-family: var(--font-mono); color: var(--purple-lt); font-weight: 600; }
    .summary-table tbody td.s-spent     { font-family: var(--font-mono); font-weight: 600; }
    .summary-table tbody td.s-balance   { font-family: var(--font-mono); font-weight: 700; }

    /* ── ANIMATIONS ──────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #content > * { animation: fadeUp 0.25s ease both; }

    /* number input arrow fix iOS */
    input[type=number] { -moz-appearance: textfield; }
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  </style>
</head>
<body>

<div id="app-header">
  <div class="app-title-row">
    <span class="app-title">Allowance</span>
    <span class="app-badge">30-Day Tracker</span>
    <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
      <button class="io-btn import-btn" onclick="triggerImport()" title="Import data">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Import
      </button>
      <button class="io-btn export-btn" onclick="exportData()" title="Export data">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Export
      </button>
    </div>
  </div>
  <div id="tab-strip">
    <button class="tab-btn summary-tab active" data-tab="summary" onclick="switchTab('summary')">Σ Summary</button>
  </div>
</div>

<input type="file" id="import-file-input" accept=".json,application/json" style="display:none" />

<div id="toast"></div>

<div id="modal-overlay">
  <div class="modal-box">
    <div class="modal-icon">⚠️</div>
    <div class="modal-title">Replace all data?</div>
    <div class="modal-body">
      This will <strong>overwrite</strong> your current entries with the imported file. This cannot be undone.
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-confirm" id="modal-confirm-btn">Yes, Import</button>
    </div>
  </div>
</div>

<div id="content"></div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'allowance-tracker-v1';
let data = {}; // { "1": [{id, description, amount}], ... }

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) data = JSON.parse(raw);
  } catch(e) {}
}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

function getEntries(day) { return data[day] || []; }

function addEntry(day, desc, amount) {
  if (!data[day]) data[day] = [];
  data[day].push({ id: Date.now(), description: desc, amount: parseFloat(amount) });
  save();
}

function removeEntry(day, id) {
  if (!data[day]) return;
  data[day] = data[day].filter(e => e.id !== id);
  save();
}

// ─── FORMAT ──────────────────────────────────────────────────────────────────
function fmtCAD(n) {
  return new Intl.NumberFormat('en-CA', {
    style: 'currency', currency: 'CAD', minimumFractionDigits: 2
  }).format(n);
}

// ─── TABS ─────────────────────────────────────────────────────────────────────
let activeTab = 'summary';

function buildTabs() {
  const strip = document.getElementById('tab-strip');
  // keep summary button, build day buttons
  for (let d = 1; d <= 30; d++) {
    const btn = document.createElement('button');
    btn.className = 'tab-btn';
    btn.id = `tab-btn-${d}`;
    btn.setAttribute('data-tab', d);
    btn.onclick = () => switchTab(d);

    const numSpan = document.createElement('span');
    numSpan.textContent = d;
    btn.appendChild(numSpan);

    const dot = document.createElement('span');
    dot.className = 'tab-dot';
    dot.id = `tab-dot-${d}`;
    dot.style.background = 'transparent';
    btn.appendChild(dot);

    strip.appendChild(btn);
  }
}

function updateTabDots() {
  for (let d = 1; d <= 30; d++) {
    const entries = getEntries(d);
    const dot = document.getElementById(`tab-dot-${d}`);
    if (!dot) continue;
    if (entries.length === 0) { dot.style.background = 'transparent'; continue; }
    const spent = entries.reduce((s,e) => s + e.amount, 0);
    const bal = d * 1000 - spent;
    dot.style.background = bal > 0 ? '#FACC15' : bal === 0 ? '#4ADE80' : '#FB923C';
  }
}

function switchTab(tab) {
  activeTab = tab;
  // update button states
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.getAttribute('data-tab') == tab);
  });
  // scroll active tab into view
  const activeBtn = document.querySelector(`.tab-btn[data-tab="${tab}"]`);
  if (activeBtn) activeBtn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });

  render();
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  updateTabDots();
  const content = document.getElementById('content');
  content.innerHTML = '';
  if (activeTab === 'summary') {
    content.appendChild(renderSummary());
  } else {
    content.appendChild(renderDay(activeTab));
  }
}

function renderDay(day) {
  const allowance = day * 1000;
  const entries = getEntries(day);
  const totalSpent = entries.reduce((s,e) => s + e.amount, 0);
  const balance = allowance - totalSpent;

  const wrap = document.createElement('div');

  // ── Header
  wrap.innerHTML = `
    <div style="margin-bottom:6px">
      <div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap">
        <span class="day-heading">Day ${day}</span>
        <span class="day-of-total">/ 30</span>
      </div>
      <div class="day-subhead">
        ${day} × 1,000 CAD = <span class="day-allowance-amt">${fmtCAD(allowance)} Allowance</span>
      </div>
    </div>
    <div class="divider"></div>
  `;

  // ── Input row
  const inputRow = document.createElement('div');
  inputRow.className = 'input-row';

  const descInput = document.createElement('input');
  descInput.type = 'text';
  descInput.placeholder = 'Description';
  descInput.className = 'input-desc';
  descInput.autocomplete = 'off';
  descInput.autocorrect = 'off';
  descInput.spellcheck = false;

  const amtInput = document.createElement('input');
  amtInput.type = 'number';
  amtInput.placeholder = 'Amount';
  amtInput.className = 'input-amt';
  amtInput.inputMode = 'decimal';
  amtInput.min = '0';
  amtInput.step = '0.01';

  const addBtn = document.createElement('button');
  addBtn.className = 'add-btn';
  addBtn.textContent = '+ Add';

  function handleAdd() {
    const desc = descInput.value.trim();
    const amt = parseFloat(amtInput.value);
    if (!desc || isNaN(amt) || amt <= 0) {
      // shake hint
      descInput.style.borderColor = '#F87171';
      amtInput.style.borderColor = '#F87171';
      setTimeout(() => {
        descInput.style.borderColor = '';
        amtInput.style.borderColor = '';
      }, 800);
      return;
    }
    addEntry(day, desc, amt);
    descInput.value = '';
    amtInput.value = '';
    descInput.focus();
    render();
  }

  addBtn.addEventListener('click', handleAdd);
  [descInput, amtInput].forEach(inp => inp.addEventListener('keydown', e => { if (e.key === 'Enter') handleAdd(); }));

  inputRow.appendChild(descInput);
  inputRow.appendChild(amtInput);
  inputRow.appendChild(addBtn);
  wrap.appendChild(inputRow);

  // ── Table
  const tableWrap = document.createElement('div');
  tableWrap.className = 'table-wrap';

  const table = document.createElement('table');

  // thead
  table.innerHTML = `
    <thead>
      <tr>
        <th>Description</th>
        <th class="right">Amount</th>
        <th style="width:44px"></th>
      </tr>
    </thead>
  `;

  // tbody
  const tbody = document.createElement('tbody');
  if (entries.length === 0) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="3">No expenses yet — start spending!</td></tr>`;
  } else {
    entries.forEach(entry => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${escHtml(entry.description)}</td>
        <td class="amt-cell">${fmtCAD(entry.amount)}</td>
        <td class="del-cell">
          <button class="del-btn" title="Remove">×</button>
        </td>
      `;
      tr.querySelector('.del-btn').addEventListener('click', () => {
        removeEntry(day, entry.id);
        render();
      });
      tbody.appendChild(tr);
    });
  }
  table.appendChild(tbody);

  // tfoot
  if (entries.length > 0) {
    const tfoot = document.createElement('tfoot');
    tfoot.innerHTML = `
      <tr>
        <td>Total Spent</td>
        <td class="total-amt">${fmtCAD(totalSpent)}</td>
        <td></td>
      </tr>
    `;
    table.appendChild(tfoot);
  }

  tableWrap.appendChild(table);
  wrap.appendChild(tableWrap);

  // ── Balance badge
  const badge = document.createElement('div');
  badge.className = 'balance-badge ' + (balance > 0 ? 'positive' : balance === 0 ? 'zero' : 'negative');
  const label = balance > 0 ? 'Remaining' : balance === 0 ? 'Balanced ✓' : 'Overspent';
  badge.innerHTML = `
    <span class="balance-label">${label}</span>
    <span class="balance-amount">${fmtCAD(balance)}</span>
  `;
  wrap.appendChild(badge);

  return wrap;
}

function renderSummary() {
  const TOTAL_ALLOWANCE = (30 * 31) / 2 * 1000; // 465000
  let totalSpent = 0;
  for (let d = 1; d <= 30; d++) {
    totalSpent += getEntries(d).reduce((s,e) => s + e.amount, 0);
  }
  const netBalance = TOTAL_ALLOWANCE - totalSpent;
  const netColor = netBalance > 0 ? 'var(--green)' : netBalance === 0 ? 'var(--green)' : 'var(--orange)';

  const wrap = document.createElement('div');

  wrap.innerHTML = `
    <div class="summary-heading">Summary</div>
    <div class="summary-sub">All 30 days at a glance</div>
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-card-label">Total Allowance</div>
        <div class="stat-card-value" style="color:var(--purple-lt)">${fmtCAD(TOTAL_ALLOWANCE)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">Total Spent</div>
        <div class="stat-card-value" style="color:var(--red)">${fmtCAD(totalSpent)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">Net Balance</div>
        <div class="stat-card-value" style="color:${netColor}">${fmtCAD(netBalance)}</div>
      </div>
    </div>
  `;

  // day-by-day table
  const tableWrap = document.createElement('div');
  tableWrap.className = 'summary-table-wrap';

  const table = document.createElement('table');
  table.className = 'summary-table';
  table.innerHTML = `
    <thead>
      <tr>
        <th>Day</th>
        <th>Allowance</th>
        <th>Spent</th>
        <th>Balance</th>
      </tr>
    </thead>
  `;

  const tbody = document.createElement('tbody');
  for (let d = 1; d <= 30; d++) {
    const allowance = d * 1000;
    const spent = getEntries(d).reduce((s,e) => s + e.amount, 0);
    const bal = allowance - spent;
    const balColor = bal > 0 ? 'var(--yellow)' : bal === 0 ? 'var(--green)' : 'var(--orange)';
    const spentColor = spent > 0 ? 'var(--red)' : 'var(--border2)';

    const tr = document.createElement('tr');
    tr.style.cursor = 'pointer';
    tr.innerHTML = `
      <td>Day ${d}</td>
      <td class="s-allowance">${fmtCAD(allowance)}</td>
      <td class="s-spent" style="color:${spentColor}">${fmtCAD(spent)}</td>
      <td class="s-balance" style="color:${balColor}">${fmtCAD(bal)}</td>
    `;
    tr.addEventListener('click', () => switchTab(d));
    tbody.appendChild(tr);
  }

  table.appendChild(tbody);
  tableWrap.appendChild(table);
  wrap.appendChild(tableWrap);

  return wrap;
}

// ─── EXPORT ──────────────────────────────────────────────────────────────────
function exportData() {
  const payload = {
    version: 1,
    exported: new Date().toISOString(),
    entries: data
  };
  const json = JSON.stringify(payload, null, 2);
  const filename = `allowance-tracker-${new Date().toISOString().slice(0,10)}.json`;

  // Try native share sheet first (best on mobile)
  if (navigator.share && navigator.canShare) {
    const file = new File([json], filename, { type: 'application/json' });
    if (navigator.canShare({ files: [file] })) {
      navigator.share({ files: [file], title: 'Allowance Tracker Export' })
        .catch(err => { if (err.name !== 'AbortError') fallbackDownload(json, filename); });
      return;
    }
  }
  // Fallback: share text if file share not supported
  if (navigator.share) {
    navigator.share({ title: 'Allowance Tracker Export', text: json })
      .catch(err => { if (err.name !== 'AbortError') fallbackDownload(json, filename); });
    return;
  }
  // Desktop fallback: trigger download
  fallbackDownload(json, filename);
}

function fallbackDownload(json, filename) {
  const blob = new Blob([json], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
  showToast('✓ Export downloaded', 'success');
}

// ─── IMPORT ──────────────────────────────────────────────────────────────────
let pendingImportData = null;

function triggerImport() {
  document.getElementById('import-file-input').value = '';
  document.getElementById('import-file-input').click();
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('import-file-input').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (!parsed.entries || typeof parsed.entries !== 'object') throw new Error('Invalid format');
        pendingImportData = parsed.entries;
        showModal();
      } catch(err) {
        showToast('✗ Invalid file — not a valid export', 'error');
      }
    };
    reader.readAsText(file);
  });

  document.getElementById('modal-confirm-btn').addEventListener('click', () => {
    if (!pendingImportData) return;
    // Normalise: ensure amounts are numbers
    const cleaned = {};
    for (const [day, entries] of Object.entries(pendingImportData)) {
      if (Array.isArray(entries)) {
        cleaned[day] = entries.map(e => ({
          id: e.id || Date.now() + Math.random(),
          description: String(e.description || ''),
          amount: parseFloat(e.amount) || 0
        }));
      }
    }
    data = cleaned;
    save();
    pendingImportData = null;
    closeModal();
    render();
    showToast('✓ Data imported successfully', 'success');
  });
});

// ─── TOAST ───────────────────────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 3000);
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function showModal() {
  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
  pendingImportData = null;
}
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('modal-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
});

// ─── UTILS ───────────────────────────────────────────────────────────────────
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
load();
buildTabs();
render();
</script>
